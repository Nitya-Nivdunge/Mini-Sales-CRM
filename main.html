<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sales CRM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-chart-line me-2"></i>
                Mini Sales CRM
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#leads">Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#add-lead">Add Lead</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="container">
            <!-- Dashboard Stats -->
            <div class="row mb-4" id="dashboard">
                <div class="col-lg-3 col-md-6 mb-3">
                    <div class="stats-card">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon" style="background: var(--primary-color);">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="ms-3">
                                <h3 class="mb-0" id="total-leads">0</h3>
                                <small class="text-muted">Total Leads</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-3">
                    <div class="stats-card">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon" style="background: var(--success-color);">
                                <i class="fas fa-handshake"></i>
                            </div>
                            <div class="ms-3">
                                <h3 class="mb-0" id="sold-leads">0</h3>
                                <small class="text-muted">Sold</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-3">
                    <div class="stats-card">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon" style="background: var(--warning-color);">
                                <i class="fas fa-clock"></i>
                            </div>
                            <div class="ms-3">
                                <h3 class="mb-0" id="pending-leads">0</h3>
                                <small class="text-muted">Pending</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3 col-md-6 mb-3">
                    <div class="stats-card">
                        <div class="d-flex align-items-center">
                            <div class="stats-icon" style="background: var(--secondary-color);">
                                <i class="fas fa-percentage"></i>
                            </div>
                            <div class="ms-3">
                                <h3 class="mb-0" id="conversion-rate">0%</h3>
                                <small class="text-muted">Conversion</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Lead Form -->
            <div class="add-lead-form" id="add-lead">
                <h4 class="mb-3">
                    <i class="fas fa-user-plus me-2"></i>
                    Add New Lead
                </h4>
                <form id="add-lead-form">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="lead-name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="lead-name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lead-email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="lead-email" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lead-phone" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="lead-phone" pattern="[0-9]{10}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lead-company" class="form-label">Company</label>
                            <input type="text" class="form-control" id="lead-company">
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus me-2"></i>
                                Add Lead
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Search and Filter -->
            <div class="search-box" id="leads">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-search"></i>
                            </span>
                            <input type="text" class="form-control" id="search-input" placeholder="Search leads...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="status-filter">
                            <option value="">All Status</option>
                            <option value="new">New</option>
                            <option value="contacted">Contacted</option>
                            <option value="sold">Sold</option>
                            <option value="not-sold">Not Sold</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-outline-primary w-100" id="refresh-btn">
                            <i class="fas fa-sync-alt me-2"></i>
                            Refresh
                        </button>
                    </div>
                </div>
            </div>

            <!-- Leads Container -->
            <div id="leads-container">
                <div class="text-center py-5">
                    <div class="loading-spinner"></div>
                    <p class="mt-3 text-muted">Loading leads...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
